<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | متجرنا</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/pages/auth.css">
</head>
<body>
  <!-- Shared Navbar -->
  <nav class="navbar" id="main-navbar">
    <div class="navbar-container container">
      <a href="/" class="navbar-brand">🛍️ متجرنا</a>
      <button class="navbar-menu-toggle" id="menu-toggle" aria-label="القائمة">
        <i class="fas fa-bars"></i>
      </button>
      <ul class="navbar-links" id="nav-links">
        <li><a href="/">الرئيسية</a></li>
        <li><a href="/pages/products.html">المنتجات</a></li>
        <li><a href="/pages/cart.html" class="navbar-cart">
          <i class="fas fa-shopping-cart"></i> السلة
          <span class="navbar-cart-badge cart-count" id="cart-badge">0</span>
        </a></li>
      </ul>
      <div class="navbar-user" id="navbar-user">
        <div class="navbar-guest" id="navbar-guest">
          <a href="/pages/login.html" class="btn btn-outline btn-sm active">تسجيل الدخول</a>
          <a href="/pages/signup.html" class="btn btn-primary btn-sm">حساب جديد</a>
        </div>
        <div class="navbar-logged" id="navbar-logged" style="display:none;">
          <img src="https://ui-avatars.com/api/?name=User&background=ff6b2b&color=fff&size=36" alt="الصورة" id="nav-user-photo" class="navbar-avatar">
          <span id="nav-user-name">المستخدم</span>
          <div class="navbar-dropdown">
            <a href="/pages/orders.html"><i class="fas fa-box"></i> طلباتي</a>
            <a href="#" id="nav-logout-btn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</a>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card card-glass fade-in">
      <h2 class="auth-title">تسجيل الدخول</h2>
      
      <form id="login-form">
        <div class="form-group">
          <label for="email" class="form-label">البريد الإلكتروني</label>
          <input type="email" id="email" class="form-input" placeholder="أدخل بريدك الإلكتروني" required>
        </div>
        
        <div class="form-group">
          <label for="password" class="form-label">كلمة المرور</label>
          <div class="password-input-wrapper">
            <input type="password" id="password" class="form-input" placeholder="أدخل كلمة المرور" required>
            <button type="button" class="auth-toggle-password" id="toggle-pwd" tabindex="-1">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        
        <div class="checkbox-group">
          <input type="checkbox" id="remember">
          <label for="remember">تذكرني على هذا الجهاز</label>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block btn-lg mt-md" id="submit-btn">
          تسجيل الدخول
        </button>
      </form>
      
      <div class="auth-divider">أو</div>
      
      <div class="social-buttons" style="flex-direction: column;">
        <button type="button" class="btn btn-outline btn-block" id="google-btn" style="border-color: #ddd; color: var(--color-text-primary);">
          <i class="fab fa-google mr-sm" style="color: #ea4335;"></i> المتابعة باستخدام حساب جوجل
        </button>
      </div>
      
      <div class="auth-footer">
        ليس لديك حساب؟ <a href="/pages/signup.html">سجل الآن</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('menu-toggle')?.addEventListener('click', () => {
      document.getElementById('nav-links')?.classList.toggle('active');
    });

    // Password toggle UI
    const pwdInput = document.getElementById('password');
    const toggleBtn = document.getElementById('toggle-pwd');
    toggleBtn.addEventListener('click', () => {
      const type = pwdInput.getAttribute('type') === 'password' ? 'text' : 'password';
      pwdInput.setAttribute('type', type);
      toggleBtn.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
    });
  </script>
  
  <script type="module">
    import { supabase } from '/js/supabase.js';
    import { authManager } from '/js/auth.js';
    import { toast } from '/js/toast.js';
    import { cartManager } from '/js/cart.js';

    // If already logged in, redirect
    authManager.onAuthChange(user => {
      if (user) {
        if (user.email === 'admin@store.com') {
          window.location.href = '/pages/admin/dashboard.html';
        } else {
          const urlParams = new URLSearchParams(window.location.search);
          window.location.href = urlParams.get('redirect') || '/';
        }
      }
    });

    const form = document.getElementById('login-form');
    const submitBtn = document.getElementById('submit-btn');
    const googleBtn = document.getElementById('google-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const rawEmail = document.getElementById('email').value.trim();
      const email = rawEmail.replace(/[^\x00-\x7F]/g, "");
      const password = document.getElementById('password').value;
      
      if (!email || !password) {
        toast.error('يرجى إدخال البريد وكلمة المرور');
        return;
      }
      
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<span class="spinner" style="width:20px;height:20px;border-width:2px;display:inline-block"></span> جاري تسجيل الدخول...';
      submitBtn.disabled = true;

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password,
        });
        
        if (error) throw error;
        
        await cartManager.mergeGuestCart(data.user.id);
        toast.success('تم تسجيل الدخول بنجاح');
      } catch (error) {
        console.error(error);
        if (error.message.includes('Invalid login credentials')) {
          toast.error('البريد الإلكتروني أو كلمة المرور غير صحيحة');
        } else {
          toast.error('حدث خطأ أثناء تسجيل الدخول');
        }
      } finally {
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }
    });

    googleBtn.addEventListener('click', async () => {
      try {
        const { error } = await supabase.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: window.location.origin + '/pages/products.html'
          }
        });
        if (error) throw error;
      } catch (error) {
        console.error(error);
        toast.error('حدث خطأ أثناء التوجيه لتسجيل الدخول');
      }
    });
  </script>
</body>
</html>
