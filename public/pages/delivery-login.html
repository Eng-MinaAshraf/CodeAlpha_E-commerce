<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دخول مندوب التوصيل</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
  <style>
    body {
      background: radial-gradient(circle at 15% 50%, rgba(255, 107, 43, 0.08), transparent 25%),
                  radial-gradient(circle at 85% 30%, rgba(34, 197, 94, 0.05), transparent 25%),
                  var(--color-bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: var(--font-primary);
    }
    .delivery-login-card {
      width: 90%;
      max-width: 420px;
      padding: 3rem 2rem;
      background: rgba(30, 37, 56, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 107, 43, 0.1) inset;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .delivery-login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, #ff8c57, #ff6b2b);
    }
    .icon-container {
      width: 80px;
      height: 80px;
      background: rgba(255, 107, 43, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 0 30px rgba(255, 107, 43, 0.2);
      border: 1px solid rgba(255, 107, 43, 0.2);
    }
    .delivery-icon {
      font-size: 2.5rem;
      color: var(--color-accent);
    }
    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-wrapper i {
      position: absolute;
      right: 1rem;
      color: var(--color-text-muted);
      font-size: 1.1rem;
      transition: var(--transition-base);
    }
    .input-wrapper input {
      width: 100%;
      padding: 1rem 3rem 1rem 1rem;
      background: rgba(15, 20, 25, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      color: var(--color-text-primary);
      font-size: 1rem;
      transition: var(--transition-base);
    }
    .input-wrapper input:focus {
      outline: none;
      border-color: var(--color-accent);
      background: rgba(15, 20, 25, 0.8);
      box-shadow: 0 0 0 4px rgba(255, 107, 43, 0.1);
    }
    .input-wrapper input:focus + i,
    .input-wrapper input:not(:placeholder-shown) + i {
      color: var(--color-accent);
    }
    .btn-premium {
      background: linear-gradient(135deg, #ff8c57, #ff6b2b);
      color: white;
      border: none;
      padding: 1rem;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 20px -10px rgba(255, 107, 43, 0.6);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-premium:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 25px -10px rgba(255, 107, 43, 0.8);
    }
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 1000;
    }
    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-content {
      transform: scale(0.9);
      transition: transform 0.3s;
    }
    .modal-overlay.active .modal-content {
      transform: scale(1);
    }
  </style>
</head>
<body>

  <div class="delivery-login-card fade-in">
    <div class="icon-container">
      <i class="fas fa-motorcycle delivery-icon"></i>
    </div>
    <h1 class="mb-xs" style="font-size: 1.8rem; font-weight: 800;">بوابة المناديب</h1>
    <p class="text-secondary mb-xl" style="font-size: 0.95rem;">قم بتسجيل الدخول لتحديث حالة الشحنات</p>

    <form id="delivery-login-form">
      <div class="form-group text-right mb-lg">
        <label class="form-label" style="font-size: 0.9rem; margin-bottom: 0.5rem; display: block; color: var(--color-text-secondary);">البريد الإلكتروني للعمل</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder="name.1234@delivery.store.com" required>
        </div>
      </div>
      
      <div class="form-group text-right mb-xl">
        <label class="form-label" style="font-size: 0.9rem; margin-bottom: 0.5rem; display: block; color: var(--color-text-secondary);">الرقم السري</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <div style="display:flex; justify-content:space-between; margin-top:8px;">
          <span></span>
          <a href="#" id="forgot-password-link" style="color:var(--color-accent); font-size:0.85rem; text-decoration:none; font-weight:600;">نسيت كلمة المرور؟</a>
        </div>
      </div>

      <button type="submit" class="btn-premium btn-block w-100" id="submit-btn" style="width: 100%;">
        دخول للنظام <i class="fas fa-arrow-left mr-xs" style="margin-right: 8px;"></i>
      </button>
    </form>
    
    <div class="mt-xl text-sm text-secondary pt-md" style="border-top: 1px solid rgba(255,255,255,0.05);">
      هذه البوابة مخصصة لموظفي الشركة فقط.<br>
      <a href="/" class="text-accent hover-text-primary mt-sm" style="display:inline-block; font-weight: 600; text-decoration: none;">العودة للمتجر الرئيسي</a>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div class="modal-overlay" id="forgot-password-modal">
    <div class="modal-content admin-card text-right" style="max-width: 440px; padding: 2rem; background: rgba(30, 37, 56, 0.95); border: 1px solid rgba(255, 107, 43, 0.2); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8); border-radius: 20px;">
      <div class="modal-header" style="display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; margin-bottom: 20px; align-items: center;">
        <h2 style="font-size:1.3rem; font-weight:bold; margin:0; color:white;"><i class="fas fa-key text-accent ml-xs"></i> استعادة كلمة المرور</h2>
        <button class="modal-close" id="close-forgot-modal-btn" style="background:none; border:none; color:var(--color-text-secondary); cursor:pointer; font-size:1.2rem;">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <!-- Tab Buttons -->
      <div style="display:flex; gap:10px; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:15px; margin-bottom:20px;">
        <button type="button" class="btn btn-sm" id="tab-request-btn" style="flex:1; background:var(--color-accent); color:white;">تقديم طلب</button>
        <button type="button" class="btn btn-outline btn-sm" id="tab-status-btn" style="flex:1;">فحص الحالة</button>
      </div>

      <!-- Form 1: New Request -->
      <form id="forgot-request-form">
        <div class="form-group mb-md">
          <label class="form-label" style="display:block; font-size:0.85rem; margin-bottom:5px; color:var(--color-text-secondary);">الاسم الكامل للمندوب (مطلوب)</label>
          <input type="text" id="req-agent-name" class="form-input w-100" placeholder="مثال: Ahmed Ali" required style="width:100%; box-sizing: border-box; background: rgba(15, 20, 25, 0.6); color: white; border: 1px solid rgba(255,255,255,0.05); padding: 10px; border-radius: 8px;">
        </div>
        <div class="form-group mb-lg">
          <label class="form-label" style="display:block; font-size:0.85rem; margin-bottom:5px; color:var(--color-text-secondary);">البريد الإلكتروني (اختياري)</label>
          <input type="email" id="req-agent-email" class="form-input w-100" placeholder="name.1234@delivery.store.com" style="width:100%; box-sizing: border-box; background: rgba(15, 20, 25, 0.6); color: white; border: 1px solid rgba(255,255,255,0.05); padding: 10px; border-radius: 8px;">
        </div>
        <button type="submit" class="btn btn-primary btn-block w-100" id="submit-request-btn" style="width:100%; padding: 12px; border-radius: 8px;">إرسال الطلب للمسؤول</button>
      </form>

      <!-- Form 2: Check Status -->
      <form id="forgot-status-form" style="display:none;">
        <div class="form-group mb-lg">
          <label class="form-label" style="display:block; font-size:0.85rem; margin-bottom:5px; color:var(--color-text-secondary);">الاسم الكامل للمندوب كما هو مسجل</label>
          <input type="text" id="status-agent-name" class="form-input w-100" placeholder="مثال: Ahmed Ali" required style="width:100%; box-sizing: border-box; background: rgba(15, 20, 25, 0.6); color: white; border: 1px solid rgba(255,255,255,0.05); padding: 10px; border-radius: 8px;">
        </div>
        <button type="submit" class="btn btn-primary btn-block w-100" id="submit-status-btn" style="width:100%; padding: 12px; border-radius: 8px;">فحص حالة الطلب</button>
      </form>

      <!-- Status Results Area -->
      <div id="status-result-area" style="display:none; margin-top:20px; padding:15px; border-radius:10px; background:rgba(15, 20, 25, 0.8); border:1px solid rgba(255,255,255,0.05);">
        <!-- Content will be rendered dynamically -->
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script type="module">
    import { toast } from '/js/toast.js';

    // منع المتصفح من الاحتفاظ بالكاش للرجوع
    if (localStorage.getItem('delivery_token')) {
      window.location.replace('/pages/delivery-portal.html');
    }

    const form = document.getElementById('delivery-login-form');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      if (!email || !password) return;

      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<span class="spinner" style="width:20px;height:20px;border-width:2px;display:inline-block"></span> جاري التحقق...';
      submitBtn.disabled = true;

      try {
        const res = await fetch('/api/delivery/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const response = await res.json();
        
        if (response.success) {
          toast.success(response.message);
          
          // حفظ التوكن وبيانات الموظف
          localStorage.setItem('delivery_token', response.data.token);
          localStorage.setItem('delivery_name', response.data.name);
          
          setTimeout(() => {
            window.location.replace('/pages/delivery-portal.html');
          }, 1000);
        } else {
          toast.error(response.message);
          submitBtn.innerHTML = originalText;
          submitBtn.disabled = false;
        }
      } catch (err) {
        toast.error('حدث خطأ في الاتصال بالخادم');
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }
    });

    // ==========================================
    // Forgot Password Logic
    // ==========================================
    const forgotModal = document.getElementById('forgot-password-modal');
    const forgotLink = document.getElementById('forgot-password-link');
    const closeForgotBtn = document.getElementById('close-forgot-modal-btn');
    
    const tabRequestBtn = document.getElementById('tab-request-btn');
    const tabStatusBtn = document.getElementById('tab-status-btn');
    const forgotRequestForm = document.getElementById('forgot-request-form');
    const forgotStatusForm = document.getElementById('forgot-status-form');
    const statusResultArea = document.getElementById('status-result-area');

    // Open/Close Modal
    forgotLink.addEventListener('click', (e) => {
      e.preventDefault();
      forgotModal.classList.add('active');
      switchTab('request');
    });

    closeForgotBtn.addEventListener('click', () => {
      forgotModal.classList.remove('active');
    });

    // Tab Switching
    function switchTab(tab) {
      if (tab === 'request') {
        tabRequestBtn.className = 'btn btn-sm';
        tabRequestBtn.style.background = 'var(--color-accent)';
        tabRequestBtn.style.color = 'white';
        tabStatusBtn.className = 'btn btn-outline btn-sm';
        tabStatusBtn.style.background = 'none';
        tabStatusBtn.style.color = 'white';
        
        forgotRequestForm.style.display = 'block';
        forgotStatusForm.style.display = 'none';
        statusResultArea.style.display = 'none';
      } else {
        tabStatusBtn.className = 'btn btn-sm';
        tabStatusBtn.style.background = 'var(--color-accent)';
        tabStatusBtn.style.color = 'white';
        tabRequestBtn.className = 'btn btn-outline btn-sm';
        tabRequestBtn.style.background = 'none';
        tabRequestBtn.style.color = 'white';
        
        forgotRequestForm.style.display = 'none';
        forgotStatusForm.style.display = 'block';
        statusResultArea.style.display = 'none';
      }
    }

    tabRequestBtn.addEventListener('click', () => switchTab('request'));
    tabStatusBtn.addEventListener('click', () => switchTab('status'));

    // Submit Request (Stage 1)
    forgotRequestForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('req-agent-name').value.trim();
      const email = document.getElementById('req-agent-email').value.trim();
      
      const btn = document.getElementById('submit-request-btn');
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'جاري إرسال الطلب...';

      try {
        const res = await fetch('/api/delivery/forgot-password/request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email: email || undefined })
        });
        const response = await res.json();
        
        if (response.success) {
          toast.success('تم إرسال طلبك إلى المسؤول بنجاح.');
          forgotRequestForm.reset();
          setTimeout(() => {
            switchTab('status');
            document.getElementById('status-agent-name').value = name;
          }, 1500);
        } else {
          toast.error(response.message);
        }
      } catch (err) {
        toast.error('حدث خطأ في الاتصال بالخادم');
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    });

    // Check Status (Stage 3)
    forgotStatusForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('status-agent-name').value.trim();
      
      const btn = document.getElementById('submit-status-btn');
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'جاري الفحص...';

      try {
        const res = await fetch('/api/delivery/forgot-password/status', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });
        const response = await res.json();
        
        if (response.success) {
          statusResultArea.style.display = 'block';
          
          if (response.status === 'approved') {
            statusResultArea.innerHTML = `
              <div style="color:#10b981; font-weight:bold; margin-bottom:10px; display:flex; align-items:center; gap:8px;">
                <i class="fas fa-check-circle"></i> تم الموافقة على طلبك!
              </div>
              <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; margin-bottom:12px; border:1px solid rgba(255,107,43,0.1)">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                  <div>
                    <span style="font-size:0.75rem; color:var(--color-text-muted);">البريد الإلكتروني</span><br>
                    <span id="copy-status-email" style="font-size:0.9rem; font-weight:bold;">${response.email}</span>
                  </div>
                  <button type="button" class="btn btn-outline btn-sm status-copy-btn" data-target="copy-status-email" style="padding:4px 8px; min-width:auto; margin-right: 10px;">
                    <i class="fas fa-copy"></i>
                  </button>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                  <div>
                    <span style="font-size:0.75rem; color:var(--color-text-muted);">كلمة المرور المؤقتة</span><br>
                    <span id="copy-status-pass" style="font-size:0.9rem; font-weight:bold; color:var(--color-accent);">${response.defaultPassword}</span>
                  </div>
                  <button type="button" class="btn btn-outline btn-sm status-copy-btn" data-target="copy-status-pass" style="padding:4px 8px; min-width:auto; margin-right: 10px;">
                    <i class="fas fa-copy"></i>
                  </button>
                </div>
              </div>
              <p style="color:#ef4444; font-size:0.8rem; font-weight:600; margin:0; display:flex; align-items:center; gap:5px;">
                <i class="fas fa-exclamation-triangle"></i> الرجاء تغيير كلمة المرور فوراً بعد تسجيل الدخول.
              </p>
            `;
            
            // Wire status copy buttons
            statusResultArea.querySelectorAll('.status-copy-btn').forEach(cbtn => {
              cbtn.addEventListener('click', () => {
                const targetId = cbtn.dataset.target;
                const text = document.getElementById(targetId).textContent;
                navigator.clipboard.writeText(text).then(() => {
                  const icon = cbtn.querySelector('i');
                  icon.className = 'fas fa-check text-success';
                  setTimeout(() => { icon.className = 'fas fa-copy'; }, 1500);
                  toast.success('تم النسخ!');
                });
              });
            });

          } else if (response.status === 'pending') {
            statusResultArea.innerHTML = `
              <div style="color:#f59e0b; font-weight:bold; display:flex; align-items:center; gap:8px;">
                <i class="fas fa-clock"></i> طلبك قيد المراجعة حالياً.
              </div>
            `;
          } else if (response.status === 'rejected') {
            statusResultArea.innerHTML = `
              <div style="color:#ef4444; font-weight:bold; font-size:0.95rem; display:flex; align-items:center; gap:8px;">
                <i class="fas fa-ban"></i> <span style="font-weight:bold; color:#ef4444;">لقد تم رفض طلبك. تواصل مع المسؤول مباشرة.</span>
              </div>
            `;
          } else {
            statusResultArea.innerHTML = `
              <div style="color:var(--color-text-muted); display:flex; align-items:center; gap:8px;">
                <i class="fas fa-search"></i> لم يتم العثور على طلبات. يرجى تقديم طلب جديد.
              </div>
            `;
          }
        } else {
          toast.error(response.message);
        }
      } catch (err) {
        toast.error('حدث خطأ في الاتصال بالخادم');
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    });
  </script>
</body>
</html>
