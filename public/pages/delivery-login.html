<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دخول مندوب التوصيل</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
  <style>
    body {
      background: radial-gradient(circle at 15% 50%, rgba(255, 107, 43, 0.08), transparent 25%),
                  radial-gradient(circle at 85% 30%, rgba(34, 197, 94, 0.05), transparent 25%),
                  var(--color-bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: var(--font-primary);
    }
    .delivery-login-card {
      width: 90%;
      max-width: 420px;
      padding: 3rem 2rem;
      background: rgba(30, 37, 56, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 107, 43, 0.1) inset;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .delivery-login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, #ff8c57, #ff6b2b);
    }
    .icon-container {
      width: 80px;
      height: 80px;
      background: rgba(255, 107, 43, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 0 30px rgba(255, 107, 43, 0.2);
      border: 1px solid rgba(255, 107, 43, 0.2);
    }
    .delivery-icon {
      font-size: 2.5rem;
      color: var(--color-accent);
    }
    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-wrapper i {
      position: absolute;
      right: 1rem;
      color: var(--color-text-muted);
      font-size: 1.1rem;
      transition: var(--transition-base);
    }
    .input-wrapper input {
      width: 100%;
      padding: 1rem 3rem 1rem 1rem;
      background: rgba(15, 20, 25, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      color: var(--color-text-primary);
      font-size: 1rem;
      transition: var(--transition-base);
    }
    .input-wrapper input:focus {
      outline: none;
      border-color: var(--color-accent);
      background: rgba(15, 20, 25, 0.8);
      box-shadow: 0 0 0 4px rgba(255, 107, 43, 0.1);
    }
    .input-wrapper input:focus + i,
    .input-wrapper input:not(:placeholder-shown) + i {
      color: var(--color-accent);
    }
    .btn-premium {
      background: linear-gradient(135deg, #ff8c57, #ff6b2b);
      color: white;
      border: none;
      padding: 1rem;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 20px -10px rgba(255, 107, 43, 0.6);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-premium:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 25px -10px rgba(255, 107, 43, 0.8);
    }
  </style>
</head>
<body>

  <div class="delivery-login-card fade-in">
    <div class="icon-container">
      <i class="fas fa-motorcycle delivery-icon"></i>
    </div>
    <h1 class="mb-xs" style="font-size: 1.8rem; font-weight: 800;">بوابة المناديب</h1>
    <p class="text-secondary mb-xl" style="font-size: 0.95rem;">قم بتسجيل الدخول لتحديث حالة الشحنات</p>

    <form id="delivery-login-form">
      <div class="form-group text-right mb-lg">
        <label class="form-label" style="font-size: 0.9rem; margin-bottom: 0.5rem; display: block; color: var(--color-text-secondary);">البريد الإلكتروني للعمل</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder="name.1234@delivery.store.com" required>
        </div>
      </div>
      
      <div class="form-group text-right mb-xl">
        <label class="form-label" style="font-size: 0.9rem; margin-bottom: 0.5rem; display: block; color: var(--color-text-secondary);">الرقم السري</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" class="btn-premium btn-block w-100" id="submit-btn" style="width: 100%;">
        دخول للنظام <i class="fas fa-arrow-left mr-xs" style="margin-right: 8px;"></i>
      </button>
    </form>
    
    <div class="mt-xl text-sm text-secondary pt-md" style="border-top: 1px solid rgba(255,255,255,0.05);">
      هذه البوابة مخصصة لموظفي الشركة فقط.<br>
      <a href="/" class="text-accent hover-text-primary mt-sm" style="display:inline-block; font-weight: 600; text-decoration: none;">العودة للمتجر الرئيسي</a>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script type="module">
    import { toast } from '/js/toast.js';

    // منع المتصفح من الاحتفاظ بالكاش للرجوع
    if (localStorage.getItem('delivery_token')) {
      window.location.replace('/pages/delivery-portal.html');
    }

    const form = document.getElementById('delivery-login-form');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      if (!email || !password) return;

      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<span class="spinner" style="width:20px;height:20px;border-width:2px;display:inline-block"></span> جاري التحقق...';
      submitBtn.disabled = true;

      try {
        const res = await fetch('/api/delivery/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const response = await res.json();
        
        if (response.success) {
          toast.success(response.message);
          
          // حفظ التوكن وبيانات الموظف
          localStorage.setItem('delivery_token', response.data.token);
          localStorage.setItem('delivery_name', response.data.name);
          
          setTimeout(() => {
            window.location.replace('/pages/delivery-portal.html');
          }, 1000);
        } else {
          toast.error(response.message);
          submitBtn.innerHTML = originalText;
          submitBtn.disabled = false;
        }
      } catch (err) {
        toast.error('حدث خطأ في الاتصال بالخادم');
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
